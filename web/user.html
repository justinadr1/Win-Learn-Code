<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <h1 class="header">
            Reversing unobfuscated kernels are easy asf.
        </h1>

        <br> <br> <br>
        
        <button onclick="printUsers()">
            Print users from file
        </button>
        
        <div id="user-display" class="user-display-class">
            Users will appear here
        </div>
        
        <div>
            <input type="text" id="user-input-php">
            <button onclick="addUserPHP()"> Add user to file using PHP </button>
        </div>

        <div>
            <input type="text" id="user-input-node">
            <button onclick="addUserNode()"> Add user to file using Node </button>
        </div>

        <div>
            <input type="text" id="user-input-python">
            <button onclick="addUserPython()"> Add user to file using Python </button>
        </div>

        <br> <br> <br>

        <button onclick="printUsersMySQLPHP()">
            Print users from MySQL using PHP
        </button>

        <br>

        <button onclick="printUsersMySQLNode()">
            Print users from MySQL using Node
        </button>
        
        <div id="user-display-mysql" class="user-display-mysql-class">
            Users from MySQL will appear here
        </div>
        
        <div>
            <input type="text" id="user-input-mysql-node">
            <button onclick="addUserMySQLNode()"> Add user to MySQL using Node </button>
        </div>

        <br> <br> <br>
        
        <button onclick="postMethodNode()">
            Send data to Node
        </button>

        <script src="user.js?v=1"> </script>
        
    </body>
</html>
