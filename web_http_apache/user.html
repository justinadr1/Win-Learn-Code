<html>
    <head>
        <link rel="stylesheet" href="style.css?v=1">
    </head>
    <body>
        
        <h1 class="header">
            Reversing unobfuscated kernels is easy asf.
        </h1>

        <br> <br> <br>
        
        <button onclick="printUsers()">
            Print users from file
        </button>
        
        <div id="user-display" class="user-display-class">
            Users will appear here
        </div>

        <br>
        
        <input type="text" id="user-input">
        <button onclick="addUserPHP()"> Add user to file using PHP </button>
        <button onclick="addUserNode()"> Add user to file using Node </button>
        <button onclick="addUserFlask()"> Add user to file using Flask </button>
        <button onclick="addUserDjango()"> Add user to file using Django </button>
    
        <br><br>
        <hr>
        <br><br>

        <button onclick="getUsersMySQLPHP()">
            Print users from MySQL using PHP
        </button>

        <br>

        <button onclick="getUsersMySQLNode()">
            Print users from MySQL using Node
        </button>
        
        <div id="user-display-mysql" class="user-display-mysql-class">
            Users from MySQL will appear here
        </div>
        
        <br>

        <div>
            <input type="text" id="user-input-mysql-node">
            <button onclick="addUserMySQLNode()"> Add user to MySQL using Node </button>
        </div>

        <br> <br> <br>
        

        <script src="user.js?v=2"> </script>
        
    </body>
</html>
