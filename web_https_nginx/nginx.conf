worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;
        root         "D:/learn/web_https_nginx";

        location = /stack {
            try_files /stack/index.html =404;
        }

        location / {
            try_files $uri $uri/ =404;
        }

        location /add_user_node {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # HTTPS server
    server {
        listen       443 ssl;
        server_name  localhost;

        ssl_certificate      D:/nginx/conf/server.crt;
        ssl_certificate_key  D:/nginx/conf/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers  HIGH:!aNULL:!MD5;

        root   "D:/learn/web_https_nginx";
        index  index.html index.htm;

	location = /stack {
            try_files /stack/index.html =404;

            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }
	
	location = /old-path {
    	    return 301 https://127.0.0.1/new-endpoint;
	}

	location ~ ^/hacker/([^/]+)/?$ {
            try_files /hacker-profile.html =404;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location /node-api/ {
    	    proxy_pass https://127.0.0.1:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

	location /django-api/ {
    	    proxy_pass http://127.0.0.1:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
	}

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            include        fastcgi_params;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}