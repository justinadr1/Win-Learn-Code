<html>
    <head>
        <link rel="stylesheet" href="style.css?v=1">    
    </head>
    <body>
        <h1 class="header"> 
            Reversing VM-based binaries are hard asf. 
        </h1>
        <br>
        <div id="intro-display" class="intro-display-class">
            usage: /?name=x&age=y
        </div>
        <br>
        <p> You searched for: <strong id="  search-display"> (search results will appear here)</strong></p>
        <form action="/" method="GET">
            <input type="text" name="q" placeholder="Search..." style="font-family: monospace;">
            <button type="submit"> Search </button>
        </form>
        <br>
        <script>
            const params = new URLSearchParams(window.location.search);
            const name = params.get('name');
            const age = params.get('age');
            const q = params.get('q');
            if (name || age) {
                document.getElementById('intro-display').innerText = `You are ${name}, ${age} years old`;
            }
            if (q) {
                const display = document.getElementById('search-display');
                display.innerText = q;
            }
            function runTemp() {
                const script = document.createElement('script');
                script.src = 'temp.js?v=1';
                document.body.appendChild(script);  
            }
        </script>
        <hr>
        <br>
        <br>
        <button class="goto-hacker-class" onclick="goToHackers()">
            Go to hacker functions
        </button>        
        <script>
            function goToHackers() {
                window.location.href = "https://127.0.0.1/hacker.html";
            }
        </script>
    </body>
</html>
