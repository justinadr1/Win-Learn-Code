<html>
    <head>
        <link rel="stylesheet" href="../style.css">    
    </head>
    <body style="margin: 35px">
        <div id="stack-display-1">
            Stack will appear here    
        </div>
        <input type="text" id="stack-input-1">
        <button onclick="pushValue1()"> Push Value </button>
        <br>
        <button onclick="popValue1()"> Pop Value </button>
        <br>
        <button onclick="print1()"> Print </button>
        <br>
        <hr>
        <div id="stack-display-2">
            Other stack will appear here    
        </div>
        <input type="text" id="stack-input-2">
        <button onclick="pushValue2()"> Push Value </button>
        <br>
        <button onclick="popValue2()"> Pop Value </button>
        <br>
        <button onclick="print2()"> Print </button>
        <br>
        <!-- Object Literal Syntax -->
        <script>
            window.stack = {
                top: null,
                Push: function(v) {
                    const node = {
                        val: v,
                        bot: this.top
                    };
                    this.top = node;
                },
                Pop: function() {
                    if (!this.top)
                        return null;
                    const out = this.top.val;
                    this.top = this.top.bot;
                    return out;
                },
                Print: function() {
                    if (!this.top)
                        return console.log("Stack is empty");
                    console.log(`${this.top.val} <- top`);
                    let node = this.top.bot;
                    while (node !== null) {
                        console.log(`${node.val}`);
                        node = node.bot;
                    }  
                },
                Render: function(containerId) {
                    const container = document.getElementById(containerId);
                    if (!container)
                        return;
                    container.innerHTML = "";
                    topDiv = document.createElement('div');
                    topDiv.innerText = `Value: ${this.top.val} <- top`;
                    container.appendChild(topDiv);
                    let node = this.top.bot;
                    while (node !== null) {
                        const div = document.createElement('div');
                        div.innerText = `Value: ${node.val}`;
                        container.appendChild(div);
                        node = node.bot;
                    }
                }
            }
            window.stack.Push(100);
            window.stack.Push(200);
            window.stack.Push(300);
            window.stack.Print();
            window.stack.Render("stack-display-1");
            function pushValue1() {
                const node = document.getElementById("stack-input-1");
                window.stack.Push(node.value);
                window.stack.Render("stack-display-1");
                node.value = "";
            }
            function popValue1() {
                window.stack.Pop();
                window.stack.Render("stack-display-1")
            }
            function print1() {
                window.stack.Print();
            }
        </script>
        <!-- Class/Constructor Syntax -->
        <script>
            class Stack {
                constructor() {
                    this.top = null;
                }
                Push (v) {
                    const node = {
                        val: v,
                        bot: this.top 
                    }
                    this.top = node;
                }    
                Pop() {
                    if (!this.top)
                        return null;
                    const out = this.top.val;
                    this.top = this.top.bot;
                    return out;
                }
                Print() {
                    if (!this.top)
                        return console.log("Stack is empty");
                    console.log(`${this.top.val} <- top`);
                    let node = this.top.bot;
                    while (node !== null) {
                        console.log(`${node.val}`);
                        node = node.bot;
                    }    
                }
                Render(containerId) {
                    const container = document.getElementById(containerId);
                    if (!container)
                        return;
                    container.innerHTML = "";
                    const topDiv = document.createElement('div');
                    topDiv.innerText = `Value: ${this.top.val} <- top`;
                    container.appendChild(topDiv);
                    let node = this.top.bot;
                    while (node !== null) {
                        const div = document.createElement('div');
                        div.innerText = `Value: ${node.val}`;
                        container.appendChild(div);
                        node = node.bot;
                    }
                }
            }
            const myStack = new Stack();
            myStack.Push(400);
            myStack.Push(500);
            myStack.Push(600);
            myStack.Print();
            myStack.Render('stack-display-2');
            function pushValue2() {
                const node = document.getElementById("stack-input-2");
                myStack.Push(node.value);
                myStack.Render("stack-display-2");
                node.value = "";
            }
            function popValue2() {
                myStack.Pop();
                myStack.Render("stack-display-2")
            }
            function print2() {
                myStack.Print();
            }
        </script>
    </body>
</html>
